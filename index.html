<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --fitbit-bg: #0b0e11;
      --fitbit-card: #1a1f25;
      --fitbit-text: #ffffff;
      --fitbit-text-dim: #8b95a5;
      --fitbit-accent: #00d4ff;
      --fitbit-border: #2a2f35;

      --editorial-bg: #fffef9;
      --editorial-card: #ffffff;
      --editorial-text: #1a1a1a;
      --editorial-text-dim: #666666;
      --editorial-accent: #d63031;
      --editorial-border: #e0e0e0;

      --neon-bg: #000000;
      --neon-card: #0a0a0a;
      --neon-text: #00ffff;
      --neon-text-dim: #00ffff88;
      --neon-accent: #ff00ff;
      --neon-border: #00ffff33;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--fitbit-bg);
      color: var(--fitbit-text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* === THEMES === */
    body.theme-fitbit {
      background: var(--fitbit-bg);
      color: var(--fitbit-text);
      font-family: 'DM Sans', sans-serif;
    }

    body.theme-editorial {
      background: var(--editorial-bg);
      color: var(--editorial-text);
      font-family: 'Source Serif 4', serif;
    }

    body.theme-neon {
      background: var(--neon-bg);
      color: var(--neon-text);
      font-family: 'JetBrains Mono', monospace;
    }

    /* === SETUP SCREEN === */
    #setupScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .setup-box {
      background: var(--fitbit-card);
      border: 1px solid var(--fitbit-border);
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }

    .theme-editorial .setup-box {
      background: var(--editorial-card);
      border-color: var(--editorial-border);
    }

    .theme-neon .setup-box {
      background: var(--neon-card);
      border-color: var(--neon-border);
      box-shadow: 0 0 20px var(--neon-border);
    }

    .setup-box h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .setup-box p {
      color: var(--fitbit-text-dim);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .theme-editorial .setup-box p {
      color: var(--editorial-text-dim);
    }

    .theme-neon .setup-box p {
      color: var(--neon-text-dim);
    }

    .setup-box input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 1px solid var(--fitbit-border);
      background: var(--fitbit-bg);
      color: var(--fitbit-text);
      border-radius: 8px;
      margin-bottom: 16px;
      font-family: inherit;
    }

    .theme-editorial .setup-box input {
      border-color: var(--editorial-border);
      background: var(--editorial-bg);
      color: var(--editorial-text);
    }

    .theme-neon .setup-box input {
      border-color: var(--neon-border);
      background: var(--neon-bg);
      color: var(--neon-text);
    }

    .setup-box button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      background: var(--fitbit-accent);
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }

    .setup-box button:hover {
      opacity: 0.9;
    }

    .theme-editorial .setup-box button {
      background: var(--editorial-accent);
      color: #fff;
    }

    .theme-neon .setup-box button {
      background: var(--neon-accent);
      color: #000;
      box-shadow: 0 0 10px var(--neon-accent);
    }

    /* === HEADER === */
    header {
      padding: 20px;
      border-bottom: 1px solid var(--fitbit-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .theme-editorial header {
      border-bottom-color: var(--editorial-border);
    }

    .theme-neon header {
      border-bottom-color: var(--neon-border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--fitbit-card);
      border: 1px solid var(--fitbit-border);
      border-radius: 24px;
    }

    .theme-editorial .user-badge {
      background: var(--editorial-card);
      border-color: var(--editorial-border);
    }

    .theme-neon .user-badge {
      background: var(--neon-card);
      border-color: var(--neon-border);
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--fitbit-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: #000;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-name {
      font-weight: 600;
      font-size: 14px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--fitbit-border);
      background: var(--fitbit-card);
      color: var(--fitbit-text);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--fitbit-accent);
      color: #000;
      border-color: var(--fitbit-accent);
    }

    .theme-editorial .btn {
      border-color: var(--editorial-border);
      background: var(--editorial-card);
      color: var(--editorial-text);
    }

    .theme-editorial .btn:hover {
      background: var(--editorial-accent);
      color: #fff;
      border-color: var(--editorial-accent);
    }

    .theme-neon .btn {
      border-color: var(--neon-border);
      background: var(--neon-card);
      color: var(--neon-text);
    }

    .theme-neon .btn:hover {
      background: var(--neon-accent);
      color: #000;
      border-color: var(--neon-accent);
      box-shadow: 0 0 10px var(--neon-accent);
    }

    .theme-switcher {
      display: flex;
      gap: 8px;
    }

    .theme-btn {
      padding: 8px 12px;
      font-size: 12px;
      border: 1px solid var(--fitbit-border);
      background: var(--fitbit-card);
      color: var(--fitbit-text-dim);
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }

    .theme-btn.active {
      background: var(--fitbit-accent);
      color: #000;
      border-color: var(--fitbit-accent);
    }

    .theme-editorial .theme-btn {
      border-color: var(--editorial-border);
      background: var(--editorial-card);
      color: var(--editorial-text-dim);
    }

    .theme-editorial .theme-btn.active {
      background: var(--editorial-accent);
      color: #fff;
      border-color: var(--editorial-accent);
    }

    .theme-neon .theme-btn {
      border-color: var(--neon-border);
      background: var(--neon-card);
      color: var(--neon-text-dim);
    }

    .theme-neon .theme-btn.active {
      background: var(--neon-accent);
      color: #000;
      border-color: var(--neon-accent);
    }

    /* === MAIN CONTAINER === */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    /* === GRID === */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* === CARDS === */
    .card {
      background: var(--fitbit-card);
      border: 1px solid var(--fitbit-border);
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .card:hover {
      border-color: var(--fitbit-accent);
      transform: translateY(-2px);
    }

    .theme-editorial .card {
      background: var(--editorial-card);
      border-color: var(--editorial-border);
    }

    .theme-editorial .card:hover {
      border-color: var(--editorial-accent);
    }

    .theme-neon .card {
      background: var(--neon-card);
      border-color: var(--neon-border);
    }

    .theme-neon .card:hover {
      border-color: var(--neon-accent);
      box-shadow: 0 0 20px var(--neon-border);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--fitbit-text-dim);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .theme-editorial .card-title {
      color: var(--editorial-text-dim);
      font-size: 12px;
      letter-spacing: 1px;
    }

    .theme-neon .card-title {
      color: var(--neon-text-dim);
      font-size: 12px;
    }

    .card-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .card-label {
      font-size: 14px;
      color: var(--fitbit-text-dim);
    }

    .theme-editorial .card-label {
      color: var(--editorial-text-dim);
    }

    .theme-neon .card-label {
      color: var(--neon-text-dim);
    }

    /* === HERO CARD (for rings/circles) === */
    .hero-card {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 24px;
    }

    .hero-ring-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 24px;
      width: 100%;
      text-align: center;
    }

    .hero-stat-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hero-stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--fitbit-accent);
    }

    .theme-editorial .hero-stat-value {
      color: var(--editorial-accent);
    }

    .theme-neon .hero-stat-value {
      color: var(--neon-accent);
    }

    .hero-stat-label {
      font-size: 14px;
      color: var(--fitbit-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .theme-editorial .hero-stat-label {
      color: var(--editorial-text-dim);
    }

    .theme-neon .hero-stat-label {
      color: var(--neon-text-dim);
    }

    /* === DETAIL PAGES === */
    .detail-page {
      display: none;
    }

    .detail-page.active {
      display: block;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .back-btn {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--fitbit-border);
      background: var(--fitbit-card);
      color: var(--fitbit-text);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .back-btn:hover {
      background: var(--fitbit-accent);
      color: #000;
      border-color: var(--fitbit-accent);
    }

    .theme-editorial .back-btn {
      border-color: var(--editorial-border);
      background: var(--editorial-card);
      color: var(--editorial-text);
    }

    .theme-editorial .back-btn:hover {
      background: var(--editorial-accent);
      color: #fff;
      border-color: var(--editorial-accent);
    }

    .theme-neon .back-btn {
      border-color: var(--neon-border);
      background: var(--neon-card);
      color: var(--neon-text);
    }

    .theme-neon .back-btn:hover {
      background: var(--neon-accent);
      color: #000;
      border-color: var(--neon-accent);
    }

    .detail-title {
      font-size: 32px;
      font-weight: 700;
    }

    .chart-container {
      background: var(--fitbit-card);
      border: 1px solid var(--fitbit-border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .theme-editorial .chart-container {
      background: var(--editorial-card);
      border-color: var(--editorial-border);
    }

    .theme-neon .chart-container {
      background: var(--neon-card);
      border-color: var(--neon-border);
    }

    .chart-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }

    /* === LOADING === */
    .loading {
      text-align: center;
      padding: 60px 20px;
      font-size: 18px;
      color: var(--fitbit-text-dim);
    }

    .theme-editorial .loading {
      color: var(--editorial-text-dim);
    }

    .theme-neon .loading {
      color: var(--neon-text-dim);
    }

    /* === UTILITIES === */
    .hidden {
      display: none !important;
    }

    .text-center {
      text-align: center;
    }

    .mb-4 {
      margin-bottom: 16px;
    }

    /* === EDITORIAL SPECIFIC === */
    .theme-editorial h1,
    .theme-editorial h2,
    .theme-editorial h3 {
      font-family: 'Playfair Display', serif;
    }

    .theme-editorial .card-title {
      font-family: 'Outfit', sans-serif;
    }

    /* === NEON SPECIFIC === */
    .theme-neon .card {
      position: relative;
    }

    .theme-neon .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(45deg, var(--neon-accent), var(--neon-text));
      border-radius: 16px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: -1;
    }

    .theme-neon .card:hover::before {
      opacity: 0.2;
    }
  </style>
</head>
<body class="theme-fitbit">
  <!-- Setup Screen -->
  <div id="setupScreen" class="hidden">
    <div class="setup-box">
      <h1>🏃 Fitness Dashboard</h1>
      <p>Connect your Fitbit account to get started. You'll need your Fitbit OAuth Client ID.</p>
      <input type="text" id="clientIdInput" placeholder="Enter Client ID" />
      <button id="connectBtn">Connect Fitbit</button>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div id="dashboard" class="hidden">
    <header>
      <div class="header-left">
        <div class="user-badge" id="userBadge">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-name" id="userName">Loading...</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn" id="refreshBtn">↻ Refresh</button>
        <button class="btn" id="demoBtn">Demo Mode</button>
        <button class="btn" id="logoutBtn">Logout</button>
        <div class="theme-switcher">
          <button class="theme-btn active" data-theme="fitbit">Fitbit</button>
          <button class="theme-btn" data-theme="editorial">Editorial</button>
          <button class="theme-btn" data-theme="neon">Neon</button>
        </div>
      </div>
    </header>

    <main>
      <!-- Overview Page -->
      <div id="overviewPage">
        <div class="loading" id="loadingIndicator">Loading your data...</div>
        <div id="dataContainer" class="hidden">
          <!-- Data will be rendered here -->
        </div>
      </div>

      <!-- Detail Pages -->
      <div id="sleepDetailPage" class="detail-page"></div>
      <div id="heartDetailPage" class="detail-page"></div>
      <div id="stepsDetailPage" class="detail-page"></div>
      <div id="weightDetailPage" class="detail-page"></div>
      <div id="activityDetailPage" class="detail-page"></div>
    </main>
  </div>

  <script src="fitbit-api.js"></script>
  <script>
    // === GLOBAL STATE ===
    const api = new FitbitAPI();
    let currentData = null;
    let currentTheme = 'fitbit';
    let isDemoMode = false;

    // === DEMO DATA ===
    const DEMO_DATA = {
      profile: {
        user: {
          displayName: 'Demo User',
          avatar: '',
          memberSince: '2020-01-01'
        }
      },
      activity: {
        summary: {
          steps: 8543,
          distance: 6.2,
          floors: 12,
          caloriesOut: 2345,
          activeMinutes: 45,
          sedentaryMinutes: 680,
          lightlyActiveMinutes: 180,
          fairlyActiveMinutes: 30,
          veryActiveMinutes: 15
        },
        goals: {
          steps: 10000,
          distance: 8,
          floors: 10,
          caloriesOut: 2500
        }
      },
      heartRate: {
        'activities-heart': [{
          dateTime: new Date().toISOString().split('T')[0],
          value: {
            restingHeartRate: 62,
            heartRateZones: [
              { name: 'Out of Range', min: 30, max: 92, minutes: 1320 },
              { name: 'Fat Burn', min: 92, max: 129, minutes: 120 },
              { name: 'Cardio', min: 129, max: 157, minutes: 30 },
              { name: 'Peak', min: 157, max: 220, minutes: 10 }
            ]
          }
        }],
        'activities-heart-intraday': {
          dataset: generateIntradayHeartRate()
        }
      },
      intradaySteps: {
        'activities-steps-intraday': {
          dataset: generateIntradaySteps()
        }
      },
      steps7d: {
        'activities-steps': generateSteps7d()
      },
      steps30d: {
        'activities-steps': generateSteps30d()
      },
      sleep: {
        sleep: [{
          dateOfSleep: new Date().toISOString().split('T')[0],
          duration: 7.5 * 60 * 60 * 1000,
          efficiency: 92,
          minutesAsleep: 450,
          minutesAwake: 38,
          timeInBed: 488,
          levels: {
            summary: {
              deep: { count: 3, minutes: 90 },
              light: { count: 12, minutes: 240 },
              rem: { count: 5, minutes: 105 },
              wake: { count: 8, minutes: 38 }
            },
            data: generateSleepLevels()
          }
        }]
      },
      sleep7d: {
        sleep: generateSleep7d()
      },
      weight: {
        weight: generateWeight30d()
      },
      lifetime: {
        lifetime: {
          total: {
            steps: 2543789,
            distance: 1854.2,
            floors: 12456
          }
        }
      },
      activityLog: {
        activities: [
          { activityName: 'Run', startTime: '2025-02-21T07:00:00', duration: 1800000, calories: 245 },
          { activityName: 'Weights', startTime: '2025-02-20T18:30:00', duration: 2700000, calories: 180 }
        ]
      },
      badges: {
        badges: [
          { badgeName: '10,000 Steps', timesAchieved: 145 },
          { badgeName: 'Daily Dozen', timesAchieved: 12 }
        ]
      },
      vo2max: {
        cardioScore: [{
          dateTime: new Date().toISOString().split('T')[0],
          value: { vo2Max: '45-49' }
        }]
      },
      breathingRate: {
        br: [{
          dateTime: new Date().toISOString().split('T')[0],
          value: { breathingRate: 16.5 }
        }]
      },
      spo2: {
        dateTime: new Date().toISOString().split('T')[0],
        value: { avg: 96.5, min: 94, max: 98 }
      },
      temperature: {
        tempSkin: [{
          dateTime: new Date().toISOString().split('T')[0],
          value: { nightlyRelative: 0.2 }
        }]
      }
    };

    function generateIntradayHeartRate() {
      const data = [];
      for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m += 5) {
          const time = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:00`;
          let hr;
          if (h < 6 || h >= 22) hr = 55 + Math.random() * 10; // sleeping
          else if (h >= 7 && h <= 8) hr = 110 + Math.random() * 30; // morning workout
          else hr = 65 + Math.random() * 15; // daytime
          data.push({ time, value: Math.round(hr) });
        }
      }
      return data;
    }

    function generateIntradaySteps() {
      const data = [];
      for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m += 15) {
          const time = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:00`;
          let steps;
          if (h < 6 || h >= 22) steps = Math.random() * 10;
          else if (h >= 7 && h <= 8) steps = 400 + Math.random() * 200;
          else steps = 50 + Math.random() * 150;
          data.push({ time, value: Math.round(steps) });
        }
      }
      return data;
    }

    function generateSteps7d() {
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        days.push({
          dateTime: date.toISOString().split('T')[0],
          value: String(6000 + Math.random() * 6000)
        });
      }
      return days;
    }

    function generateSteps30d() {
      const days = [];
      for (let i = 29; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        days.push({
          dateTime: date.toISOString().split('T')[0],
          value: String(5000 + Math.random() * 7000)
        });
      }
      return days;
    }

    function generateSleepLevels() {
      const levels = ['wake', 'light', 'deep', 'light', 'rem', 'light', 'wake', 'light', 'deep', 'light', 'rem', 'wake'];
      const data = [];
      let time = new Date();
      time.setHours(23, 0, 0, 0);
      
      levels.forEach(level => {
        const duration = (level === 'wake' ? 5 : 30) + Math.random() * 30;
        data.push({
          dateTime: time.toISOString(),
          level: level,
          seconds: Math.round(duration * 60)
        });
        time = new Date(time.getTime() + duration * 60 * 1000);
      });
      
      return data;
    }

    function generateSleep7d() {
      const sleeps = [];
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        sleeps.push({
          dateOfSleep: date.toISOString().split('T')[0],
          duration: (6.5 + Math.random() * 2) * 60 * 60 * 1000,
          efficiency: 85 + Math.random() * 10,
          minutesAsleep: 390 + Math.random() * 90
        });
      }
      return sleeps;
    }

    function generateWeight30d() {
      const weights = [];
      let baseWeight = 75;
      for (let i = 29; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        baseWeight += (Math.random() - 0.5) * 0.5;
        weights.push({
          date: date.toISOString().split('T')[0],
          weight: baseWeight.toFixed(1),
          bmi: (baseWeight / 1.75 / 1.75).toFixed(1)
        });
      }
      return weights;
    }

    // === INITIALIZATION ===
    async function init() {
      await api.init();

      // Check for OAuth callback
      if (window.location.hash.includes('access_token')) {
        api.handleCallback();
      }

      // Check authentication state
      if (!api.isAuthenticated()) {
        showSetup();
      } else {
        showDashboard();
        loadData();
      }

      // Setup event listeners
      document.getElementById('connectBtn').addEventListener('click', connectFitbit);
      document.getElementById('refreshBtn').addEventListener('click', refreshData);
      document.getElementById('demoBtn').addEventListener('click', toggleDemoMode);
      document.getElementById('logoutBtn').addEventListener('click', logout);

      // Theme switcher
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTheme(btn.dataset.theme));
      });
    }

    function showSetup() {
      document.getElementById('setupScreen').classList.remove('hidden');
      document.getElementById('dashboard').classList.add('hidden');
    }

    function showDashboard() {
      document.getElementById('setupScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
    }

    function connectFitbit() {
      const clientId = document.getElementById('clientIdInput').value.trim();
      if (!clientId) {
        alert('Please enter your Fitbit Client ID');
        return;
      }
      api.setClientId(clientId);
      window.location.href = api.getAuthUrl();
    }

    async function loadData() {
      try {
        document.getElementById('loadingIndicator').classList.remove('hidden');
        document.getElementById('dataContainer').classList.add('hidden');

        currentData = await api.getAllData();
        isDemoMode = false;

        renderDashboard();
      } catch (error) {
        console.error('Error loading data:', error);
        alert('Failed to load data. Please try again or use Demo Mode.');
      }
    }

    async function refreshData() {
      api.clearCache();
      await loadData();
    }

    function toggleDemoMode() {
      isDemoMode = !isDemoMode;
      if (isDemoMode) {
        currentData = DEMO_DATA;
        document.getElementById('demoBtn').textContent = '✓ Demo Mode';
      } else {
        document.getElementById('demoBtn').textContent = 'Demo Mode';
        loadData();
        return;
      }
      renderDashboard();
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        api.logout();
        showSetup();
      }
    }

    function switchTheme(theme) {
      currentTheme = theme;
      document.body.className = `theme-${theme}`;
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === theme);
      });
    }

    // === RENDERING ===
    function renderDashboard() {
      if (!currentData) return;

      document.getElementById('loadingIndicator').classList.add('hidden');
      document.getElementById('dataContainer').classList.remove('hidden');

      // Render user profile
      renderProfile();

      // Render overview
      renderOverview();
    }

    function renderProfile() {
      const profile = currentData.profile?.user;
      if (!profile) return;

      const userName = document.getElementById('userName');
      const userAvatar = document.getElementById('userAvatar');

      userName.textContent = profile.displayName || 'User';

      if (profile.avatar) {
        userAvatar.innerHTML = `<img src="${profile.avatar}" alt="${profile.displayName}" />`;
      } else {
        userAvatar.textContent = profile.displayName?.charAt(0) || 'U';
      }
    }

    function renderOverview() {
      const container = document.getElementById('dataContainer');
      container.innerHTML = '';

      const grid = document.createElement('div');
      grid.className = 'grid';

      // Activity summary
      if (currentData.activity?.summary) {
        const summary = currentData.activity.summary;
        const goals = currentData.activity.goals || {};

        if (summary.steps !== undefined) {
          grid.appendChild(createCard('Steps', formatNumber(summary.steps), `Goal: ${formatNumber(goals.steps || 10000)}`, () => showDetail('steps')));
        }

        if (summary.distance !== undefined) {
          grid.appendChild(createCard('Distance', `${summary.distance.toFixed(1)} km`, `Goal: ${goals.distance || 8} km`, () => showDetail('steps')));
        }

        if (summary.floors !== undefined) {
          grid.appendChild(createCard('Floors', formatNumber(summary.floors), `Goal: ${goals.floors || 10}`, () => showDetail('activity')));
        }

        if (summary.caloriesOut !== undefined) {
          grid.appendChild(createCard('Calories', formatNumber(summary.caloriesOut), `Goal: ${formatNumber(goals.caloriesOut || 2500)}`, () => showDetail('activity')));
        }

        if (summary.activeMinutes !== undefined) {
          grid.appendChild(createCard('Active Minutes', formatNumber(summary.activeMinutes), 'Today', () => showDetail('activity')));
        }
      }

      // Heart rate
      const heartData = currentData.heartRate?.['activities-heart']?.[0]?.value;
      if (heartData) {
        if (heartData.restingHeartRate !== undefined) {
          grid.appendChild(createCard('Resting Heart Rate', `${heartData.restingHeartRate} bpm`, 'Today', () => showDetail('heart')));
        }
      }

      // Sleep
      const sleep = currentData.sleep?.sleep?.[0];
      if (sleep) {
        if (sleep.minutesAsleep !== undefined) {
          const hours = Math.floor(sleep.minutesAsleep / 60);
          const mins = sleep.minutesAsleep % 60;
          grid.appendChild(createCard('Sleep', `${hours}h ${mins}m`, `Efficiency: ${sleep.efficiency || 0}%`, () => showDetail('sleep')));
        }
      }

      // Weight
      const weights = currentData.weight?.weight;
      if (weights && weights.length > 0) {
        const latest = weights[weights.length - 1];
        if (latest.weight !== undefined) {
          grid.appendChild(createCard('Weight', `${latest.weight} kg`, `BMI: ${latest.bmi || 'N/A'}`, () => showDetail('weight')));
        }
      }

      // VO2 Max
      const vo2 = currentData.vo2max?.cardioScore?.[0]?.value?.vo2Max;
      if (vo2) {
        grid.appendChild(createCard('VO2 Max', vo2, 'Cardio Fitness', () => showDetail('activity')));
      }

      // Breathing Rate
      const br = currentData.breathingRate?.br?.[0]?.value?.breathingRate;
      if (br !== undefined) {
        grid.appendChild(createCard('Breathing Rate', `${br.toFixed(1)} bpm`, 'Last night', null));
      }

      // SpO2
      const spo2 = currentData.spo2?.value?.avg;
      if (spo2 !== undefined) {
        grid.appendChild(createCard('SpO2', `${spo2.toFixed(1)}%`, `Range: ${currentData.spo2.value.min}-${currentData.spo2.value.max}%`, null));
      }

      // Temperature
      const temp = currentData.temperature?.tempSkin?.[0]?.value?.nightlyRelative;
      if (temp !== undefined) {
        grid.appendChild(createCard('Skin Temp', `${temp > 0 ? '+' : ''}${temp.toFixed(1)}°`, 'Variation', null));
      }

      // Lifetime stats
      if (currentData.lifetime?.lifetime?.total) {
        const total = currentData.lifetime.lifetime.total;
        const lifetimeCard = document.createElement('div');
        lifetimeCard.className = 'card hero-card';
        lifetimeCard.innerHTML = `
          <div class="card-title">Lifetime Stats</div>
          <div class="hero-stats">
            ${total.steps ? `<div class="hero-stat-item"><div class="hero-stat-value">${formatNumber(total.steps)}</div><div class="hero-stat-label">Total Steps</div></div>` : ''}
            ${total.distance ? `<div class="hero-stat-item"><div class="hero-stat-value">${formatNumber(total.distance)}</div><div class="hero-stat-label">Total km</div></div>` : ''}
            ${total.floors ? `<div class="hero-stat-item"><div class="hero-stat-value">${formatNumber(total.floors)}</div><div class="hero-stat-label">Total Floors</div></div>` : ''}
          </div>
        `;
        grid.appendChild(lifetimeCard);
      }

      container.appendChild(grid);
    }

    function createCard(title, value, label, onClick) {
      const card = document.createElement('div');
      card.className = 'card';
      if (onClick) {
        card.style.cursor = 'pointer';
        card.addEventListener('click', onClick);
      } else {
        card.style.cursor = 'default';
      }

      card.innerHTML = `
        <div class="card-title">${title}</div>
        <div class="card-value">${value}</div>
        <div class="card-label">${label}</div>
      `;

      return card;
    }

    // === DETAIL PAGES ===
    function showDetail(type) {
      document.getElementById('overviewPage').classList.add('hidden');
      hideAllDetails();

      const pageId = `${type}DetailPage`;
      const page = document.getElementById(pageId);
      page.classList.add('active');

      // Render detail content
      if (type === 'sleep') renderSleepDetail();
      else if (type === 'heart') renderHeartDetail();
      else if (type === 'steps') renderStepsDetail();
      else if (type === 'weight') renderWeightDetail();
      else if (type === 'activity') renderActivityDetail();
    }

    function hideAllDetails() {
      document.querySelectorAll('.detail-page').forEach(page => {
        page.classList.remove('active');
      });
    }

    function backToOverview() {
      hideAllDetails();
      document.getElementById('overviewPage').classList.remove('hidden');
    }

    function renderSleepDetail() {
      const page = document.getElementById('sleepDetailPage');
      const sleep = currentData.sleep?.sleep?.[0];
      if (!sleep) return;

      let html = `
        <div class="detail-header">
          <button class="back-btn" onclick="backToOverview()">‹ Back</button>
          <h2 class="detail-title">Sleep</h2>
        </div>
      `;

      // Sleep timeline
      if (sleep.levels?.data) {
        const timeline = renderSleepTimeline(sleep.levels.data);
        html += `
          <div class="chart-container">
            <h3 class="chart-title">Sleep Stages</h3>
            ${timeline}
            <div class="legend">
              <div class="legend-item"><div class="legend-color" style="background: #f39c12;"></div><span>Awake</span></div>
              <div class="legend-item"><div class="legend-color" style="background: #5b5ea6;"></div><span>Light</span></div>
              <div class="legend-item"><div class="legend-color" style="background: #3498db;"></div><span>REM</span></div>
              <div class="legend-item"><div class="legend-color" style="background: #8e44ad;"></div><span>Deep</span></div>
            </div>
          </div>
        `;
      }

      // Sleep stages summary
      if (sleep.levels?.summary) {
        const summary = sleep.levels.summary;
        html += `<div class="grid">`;
        if (summary.deep) html += createCard('Deep Sleep', `${summary.deep.minutes} min`, `${((summary.deep.minutes / sleep.minutesAsleep) * 100).toFixed(0)}%`).outerHTML;
        if (summary.light) html += createCard('Light Sleep', `${summary.light.minutes} min`, `${((summary.light.minutes / sleep.minutesAsleep) * 100).toFixed(0)}%`).outerHTML;
        if (summary.rem) html += createCard('REM Sleep', `${summary.rem.minutes} min`, `${((summary.rem.minutes / sleep.minutesAsleep) * 100).toFixed(0)}%`).outerHTML;
        if (summary.wake) html += createCard('Awake', `${summary.wake.minutes} min`, `${((summary.wake.minutes / sleep.minutesAsleep) * 100).toFixed(0)}%`).outerHTML;
        html += `</div>`;
      }

      // 7-day sleep trend
      if (currentData.sleep7d?.sleep) {
        const chart = renderSleep7dChart(currentData.sleep7d.sleep);
        html += `
          <div class="chart-container">
            <h3 class="chart-title">7-Day Sleep Trend</h3>
            ${chart}
          </div>
        `;
      }

      page.innerHTML = html;
    }

    function renderSleepTimeline(levels) {
      if (!levels || levels.length === 0) return '';

      const startTime = new Date(levels[0].dateTime);
      const endTime = new Date(levels[levels.length - 1].dateTime).getTime() + (levels[levels.length - 1].seconds * 1000);
      const totalDuration = endTime - startTime.getTime();

      const colors = {
        wake: '#f39c12',
        light: '#5b5ea6',
        rem: '#3498db',
        deep: '#8e44ad'
      };

      let svg = `<svg width="100%" height="80" style="margin: 16px 0;">`;

      levels.forEach(level => {
        const x = ((new Date(level.dateTime).getTime() - startTime.getTime()) / totalDuration) * 100;
        const width = (level.seconds * 1000 / totalDuration) * 100;
        const color = colors[level.level] || '#95a5a6';

        svg += `<rect x="${x}%" y="20" width="${width}%" height="40" fill="${color}" />`;
      });

      // Time labels
      const formatTime = (date) => {
        const h = date.getHours();
        const m = date.getMinutes();
        return `${h}:${String(m).padStart(2, '0')}`;
      };

      svg += `
        <text x="0" y="75" font-size="12" fill="currentColor">${formatTime(startTime)}</text>
        <text x="100%" y="75" text-anchor="end" font-size="12" fill="currentColor">${formatTime(new Date(endTime))}</text>
      `;

      svg += `</svg>`;
      return svg;
    }

    function renderSleep7dChart(sleeps) {
      if (!sleeps || sleeps.length === 0) return '';

      const maxDuration = Math.max(...sleeps.map(s => s.duration || 0));
      const barWidth = 100 / sleeps.length;

      let svg = `<svg width="100%" height="200" style="margin: 16px 0;">`;

      sleeps.forEach((sleep, i) => {
        const hours = ((sleep.duration || 0) / 1000 / 60 / 60);
        const height = (hours / (maxDuration / 1000 / 60 / 60)) * 150;
        const x = i * barWidth;

        svg += `
          <rect x="${x + 1}%" y="${170 - height}" width="${barWidth - 2}%" height="${height}" 
                fill="var(--fitbit-accent)" opacity="0.8" />
          <text x="${x + barWidth / 2}%" y="195" text-anchor="middle" font-size="10" fill="currentColor">
            ${new Date(sleep.dateOfSleep).toLocaleDateString('en-US', { weekday: 'short' })}
          </text>
        `;
      });

      svg += `</svg>`;
      return svg;
    }

    function renderHeartDetail() {
      const page = document.getElementById('heartDetailPage');
      const heartData = currentData.heartRate?.['activities-heart']?.[0]?.value;
      const intraday = currentData.intradayHeartRate?.['activities-heart-intraday']?.dataset;

      let html = `
        <div class="detail-header">
          <button class="back-btn" onclick="backToOverview()">‹ Back</button>
          <h2 class="detail-title">Heart Rate</h2>
        </div>
      `;

      // Intraday chart
      if (intraday && intraday.length > 0) {
        const chart = renderHeartRateChart(intraday, heartData?.heartRateZones);
        html += `
          <div class="chart-container">
            <h3 class="chart-title">Heart Rate Today</h3>
            ${chart}
            <div class="legend">
              <div class="legend-item"><div class="legend-color" style="background: #95a5a6;"></div><span>Out of Range</span></div>
              <div class="legend-item"><div class="legend-color" style="background: #f1c40f;"></div><span>Fat Burn</span></div>
              <div class="legend-item"><div class="legend-color" style="background: #e67e22;"></div><span>Cardio</span></div>
              <div class="legend-item"><div class="legend-color" style="background: #e74c3c;"></div><span>Peak</span></div>
            </div>
          </div>
        `;
      }

      // Heart rate zones
      if (heartData?.heartRateZones) {
        html += `<div class="grid">`;
        heartData.heartRateZones.forEach(zone => {
          html += createCard(zone.name, `${zone.minutes} min`, `${zone.min}-${zone.max} bpm`).outerHTML;
        });
        html += `</div>`;
      }

      page.innerHTML = html;
    }

    function renderHeartRateChart(intraday, zones) {
      if (!intraday || intraday.length === 0) return '';

      const values = intraday.map(d => d.value);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const avg = values.reduce((a, b) => a + b, 0) / values.length;

      const points = intraday.map((d, i) => {
        const x = (i / intraday.length) * 100;
        const y = 180 - ((d.value - min) / (max - min)) * 150;
        return `${x},${y}`;
      }).join(' ');

      let svg = `<svg width="100%" height="200" style="margin: 16px 0;">`;

      // Zone backgrounds
      if (zones) {
        zones.forEach(zone => {
          const y1 = 180 - ((zone.max - min) / (max - min)) * 150;
          const y2 = 180 - ((zone.min - min) / (max - min)) * 150;
          const colors = {
            'Out of Range': '#95a5a6',
            'Fat Burn': '#f1c40f',
            'Cardio': '#e67e22',
            'Peak': '#e74c3c'
          };
          svg += `<rect x="0" y="${y1}" width="100%" height="${y2 - y1}" fill="${colors[zone.name] || '#ccc'}" opacity="0.1" />`;
        });
      }

      // Line
      svg += `<polyline points="${points}" fill="none" stroke="var(--fitbit-accent)" stroke-width="2" />`;

      // Min/Max/Avg labels
      svg += `
        <text x="10" y="20" font-size="12" fill="currentColor">Max: ${Math.round(max)} bpm</text>
        <text x="10" y="100" font-size="12" fill="currentColor">Avg: ${Math.round(avg)} bpm</text>
        <text x="10" y="175" font-size="12" fill="currentColor">Min: ${Math.round(min)} bpm</text>
      `;

      svg += `</svg>`;
      return svg;
    }

    function renderStepsDetail() {
      const page = document.getElementById('stepsDetailPage');

      let html = `
        <div class="detail-header">
          <button class="back-btn" onclick="backToOverview()">‹ Back</button>
          <h2 class="detail-title">Steps</h2>
        </div>
      `;

      // Intraday steps
      if (currentData.intradaySteps?.['activities-steps-intraday']?.dataset) {

        html += `
          <div class="chart-container">
            <h3 class="chart-title">Steps Today (15-min intervals)</h3>
            ${chart}
          </div>
        `;
      }

      // 7-day chart
      if (currentData.steps7d?.['activities-steps']) {
        const chart = renderSteps7dChart(currentData.steps7d['activities-steps']);
        html += `
          <div class="chart-container">
            <h3 class="chart-title">7-Day Steps</h3>
            ${chart}
          </div>
        `;
      }

      // 30-day trend
      if (currentData.steps30d?.['activities-steps']) {
        const chart = renderSteps30dChart(currentData.steps30d['activities-steps']);

          <div class="chart-container">
            <h3 class="chart-title">30-Day Trend</h3>
            ${chart}
          </div>
        `;

    function renderIntradayStepsChart(dataset) {
      if (!dataset || dataset.length === 0) return '';

      const maxSteps = Math.max(...dataset.map(d => d.value));
      const barWidth = 100 / dataset.length;

      let svg = `<svg width="100%" height="200" style="margin: 16px 0;">`;

      dataset.forEach((d, i) => {
        const height = (d.value / maxSteps) * 150;
        const x = (i / dataset.length) * 100;

        svg += `<rect x="${x}%" y="${170 - height}" width="${barWidth}%" height="${height}" 
                fill="var(--fitbit-accent)" opacity="0.7" />`;
      });

      svg += `</svg>`;
      return svg;
    }

    function renderSteps7dChart(steps) {
      if (!steps || steps.length === 0) return '';

      const maxSteps = Math.max(...steps.map(s => parseInt(s.value)));
      const barWidth = 100 / steps.length;

      let svg = `<svg width="100%" height="200" style="margin: 16px 0;">`;

      steps.forEach((step, i) => {
        const value = parseInt(step.value);
        const height = (value / maxSteps) * 150;
        const x = i * barWidth;

        svg += `
          <rect x="${x + 1}%" y="${170 - height}" width="${barWidth - 2}%" height="${height}" 
                fill="var(--fitbit-accent)" opacity="0.8" />
          <text x="${x + barWidth / 2}%" y="195" text-anchor="middle" font-size="10" fill="currentColor">
            ${new Date(step.dateTime).toLocaleDateString('en-US', { weekday: 'short' })}
          </text>
        `;
      });

      svg += `</svg>`;
      return svg;
    }

    function renderSteps30dChart(steps) {
      if (!steps || steps.length === 0) return '';

      const values = steps.map(s => parseInt(s.value));
      const max = Math.max(...values);
      const min = Math.min(...values);

      const points = steps.map((s, i) => {
        const x = (i / steps.length) * 100;
        const y = 180 - ((parseInt(s.value) - min) / (max - min)) * 150;
        return `${x},${y}`;
      }).join(' ');

      let svg = `<svg width="100%" height="200" style="margin: 16px 0;">`;
      svg += `<polyline points="${points}" fill="none" stroke="var(--fitbit-accent)" stroke-width="2" />`;
      
      // Fill area
      const areaPoints = `0,180 ${points} 100,180`;
      svg += `<polygon points="${areaPoints}" fill="var(--fitbit-accent)" opacity="0.2" />`;

      svg += `</svg>`;
      return svg;
    }

    function renderWeightDetail() {
      const page = document.getElementById('weightDetailPage');
      const weights = currentData.weight?.weight;

      let html = `
        <div class="detail-header">
          <button class="back-btn" onclick="backToOverview()">‹ Back</button>
          <h2 class="detail-title">Weight</h2>
        </div>
      `;

      if (weights && weights.length > 0) {
        const chart = renderWeightChart(weights);
        html += `
          <div class="chart-container">
            <h3 class="chart-title">30-Day Weight Trend</h3>
            ${chart}
          </div>
        `;

        const latest = weights[weights.length - 1];
        html += `<div class="grid">`;
        html += createCard('Current Weight', `${latest.weight} kg`, latest.date).outerHTML;
        if (latest.bmi) html += createCard('BMI', latest.bmi, 'Body Mass Index').outerHTML;
        html += `</div>`;
      }

      page.innerHTML = html;
    }

    function renderWeightChart(weights) {
      if (!weights || weights.length === 0) return '';

      const values = weights.map(w => parseFloat(w.weight));
      const max = Math.max(...values);
      const min = Math.min(...values);

      const points = weights.map((w, i) => {
        const x = (i / weights.length) * 100;
        const y = 180 - ((parseFloat(w.weight) - min) / (max - min)) * 150;
        return `${x},${y}`;
      }).join(' ');

      let svg = `<svg width="100%" height="200" style="margin: 16px 0;">`;
      
      // Goal line (example: use first weight as goal)
      const goal = values[0];
      const goalY = 180 - ((goal - min) / (max - min)) * 150;
      svg += `<line x1="0" y1="${goalY}" x2="100%" y2="${goalY}" stroke="var(--fitbit-text-dim)" stroke-width="1" stroke-dasharray="4" />`;

      // Trend line
      svg += `<polyline points="${points}" fill="none" stroke="var(--fitbit-accent)" stroke-width="2" />`;

      // Points
      weights.forEach((w, i) => {
        const x = (i / weights.length) * 100;
        const y = 180 - ((parseFloat(w.weight) - min) / (max - min)) * 150;
        svg += `<circle cx="${x}%" cy="${y}" r="3" fill="var(--fitbit-accent)" />`;
      });

      svg += `</svg>`;
      return svg;
    }

    function renderActivityDetail() {
      const page = document.getElementById('activityDetailPage');
      const summary = currentData.activity?.summary;

      let html = `
        <div class="detail-header">
          <button class="back-btn" onclick="backToOverview()">‹ Back</button>
          <h2 class="detail-title">Activity</h2>
        </div>
      `;

      // Activity breakdown pie chart
      if (summary) {
        const chart = renderActivityBreakdownChart(summary);
        html += `
          <div class="chart-container">
            <h3 class="chart-title">Activity Breakdown</h3>
            ${chart}
            <div class="legend">
              <div class="legend-item"><div class="legend-color" style="background: #95a5a6;"></div><span>Sedentary</span></div>
              <div class="legend-item"><div class="legend-color" style="background: #3498db;"></div><span>Lightly Active</span></div>
              <div class="legend-item"><div class="legend-color" style="background: #f39c12;"></div><span>Fairly Active</span></div>
              <div class="legend-item"><div class="legend-color" style="background: #e74c3c;"></div><span>Very Active</span></div>
            </div>
          </div>
        `;
      }

      // Activity log
      if (currentData.activityLog?.activities) {
        html += `<div class="chart-container"><h3 class="chart-title">Recent Activities</h3>`;
        currentData.activityLog.activities.forEach(activity => {
          const date = new Date(activity.startTime).toLocaleDateString();
          const duration = Math.round(activity.duration / 60000);
          html += `<div style="padding: 12px; border-bottom: 1px solid var(--fitbit-border);">
            <strong>${activity.activityName}</strong><br>
            <span style="color: var(--fitbit-text-dim); font-size: 14px;">${date} • ${duration} min • ${activity.calories} cal</span>
          </div>`;
        });
        html += `</div>`;
      }

      page.innerHTML = html;
    }

    function renderActivityBreakdownChart(summary) {
      const sedentary = summary.sedentaryMinutes || 0;
      const light = summary.lightlyActiveMinutes || 0;
      const fair = summary.fairlyActiveMinutes || 0;
      const very = summary.veryActiveMinutes || 0;

      const total = sedentary + light + fair + very;
      if (total === 0) return '';

      const data = [
        { label: 'Sedentary', value: sedentary, color: '#95a5a6' },
        { label: 'Lightly Active', value: light, color: '#3498db' },
        { label: 'Fairly Active', value: fair, color: '#f39c12' },
        { label: 'Very Active', value: very, color: '#e74c3c' }
      ];

      // Donut chart
      let svg = `<svg width="100%" height="250" viewBox="0 0 200 200" style="margin: 16px 0;">`;
      
      const cx = 100, cy = 100, r = 80, innerR = 50;
      let currentAngle = -90;

      data.forEach(d => {
        const angle = (d.value / total) * 360;
        const endAngle = currentAngle + angle;

        const x1 = cx + r * Math.cos(currentAngle * Math.PI / 180);
        const y1 = cy + r * Math.sin(currentAngle * Math.PI / 180);
        const x2 = cx + r * Math.cos(endAngle * Math.PI / 180);
        const y2 = cy + r * Math.sin(endAngle * Math.PI / 180);

        const x3 = cx + innerR * Math.cos(endAngle * Math.PI / 180);
        const y3 = cy + innerR * Math.sin(endAngle * Math.PI / 180);
        const x4 = cx + innerR * Math.cos(currentAngle * Math.PI / 180);
        const y4 = cy + innerR * Math.sin(currentAngle * Math.PI / 180);

        const largeArc = angle > 180 ? 1 : 0;

        svg += `
          <path d="M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} 
                   L ${x3} ${y3} A ${innerR} ${innerR} 0 ${largeArc} 0 ${x4} ${y4} Z"
                fill="${d.color}" />
        `;

        currentAngle = endAngle;
      });

      // Center text
      svg += `
        <text x="100" y="95" text-anchor="middle" font-size="24" font-weight="700" fill="currentColor">
          ${Math.round(total / 60)}h
        </text>
        <text x="100" y="110" text-anchor="middle" font-size="12" fill="currentColor" opacity="0.7">
          Total
        </text>
      `;

      svg += `</svg>`;
      return svg;
    }

    // === UTILITIES ===
    function formatNumber(num) {
      return num?.toLocaleString() || '0';
    }

    // Make backToOverview available globally
    window.backToOverview = backToOverview;

    // Initialize app
    init();
  </script>
</body>
</html>
